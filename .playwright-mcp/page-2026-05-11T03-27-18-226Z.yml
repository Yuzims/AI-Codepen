        - heading "3. 配置 .claude.json" [level=3] [ref=e191]
        - paragraph [ref=e192]:
          - text: 编辑或新增
          - code [ref=e193]: ~/.claude.json
          - text: 文件（Windows 为
          - code [ref=e194]: 用户目录/.claude.json
          - text: ），添加以下内容跳过首次引导流程：
        - code [ref=e196]: "{ \"hasCompletedOnboarding\": true }"
        - generic [ref=e197]:
          - generic [ref=e198]: 为什么需要这一步？
          - paragraph [ref=e199]: 配置此参数后，Claude Code 启动时会跳过官方的 onboarding 引导流程，直接进入使用状态，避免因网络限制导致卡在引导页面。
        - heading "#基本使用方法" [level=2] [ref=e200]
        - heading "1. 启动 Claude Code" [level=3] [ref=e201]
        - code [ref=e203]: "# 在项目目录中启动 cd your-project claude"
