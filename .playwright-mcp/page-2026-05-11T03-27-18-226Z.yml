        - generic [ref=e157]:
          - generic [ref=e158]: 🚀 一键配置（推荐）
          - paragraph [ref=e159]: 嫌手动配置麻烦？先安装好 Node.js、Git 和 Claude Code CLI（见下方步骤 1、2），然后运行以下命令即可一键完成配置：
          - code [ref=e161]: npx xingkong-ai
        - heading "1. 安装 Node.js" [level=3] [ref=e162]
        - paragraph [ref=e163]: 如果尚未安装 Node.js，推荐使用 nvm 进行版本管理：
        - code [ref=e165]: "# 安装 nvm curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.0/install.sh | bash # 安装 Node.js LTS nvm install --lts nvm use --lts # 验证安装 node --version # 应显示 v18+ 或 v20+"
        - generic [ref=e166]:
          - generic [ref=e167]: ⚠ Windows 用户注意
          - paragraph [ref=e168]:
            - text: Windows 系统还需要额外安装
            - link "Git for Windows" [ref=e169] [cursor=pointer]:
              - /url: https://git-scm.com/downloads/win
            - text: ，否则 Claude Code 可能无法正常运行。安装时保持默认选项即可。
        - heading "2. 安装 Claude Code CLI（必须）" [level=3] [ref=e170]
        - paragraph [ref=e171]: 这是后续所有配置的前提，必须先在本地安装好 Claude Code CLI 工具：
        - code [ref=e173]: npm install -g @anthropic-ai/claude-code
        - generic [ref=e174]:
          - generic [ref=e175]: 验证安装
          - paragraph [ref=e176]:
            - text: 运行
            - code [ref=e177]: claude --version
            - text: 确认安装成功。
        - heading "#API 配置（关键步骤）" [level=2] [ref=e178]
        - heading "1. 获取令牌" [level=3] [ref=e179]
        - paragraph [ref=e180]: 前往 星空·AI 控制台获取您的 API Key。注册即送免费额度。
        - heading "2. 配置环境变量" [level=3] [ref=e181]
        - paragraph [ref=e182]:
          - text: 编辑配置文件
          - code [ref=e183]: ~/.claude/settings.json
          - text: ：
        - code [ref=e185]: "{ \"env\": { \"ANTHROPIC_AUTH_TOKEN\": \"sk-your-api-key\", \"ANTHROPIC_BASE_URL\": \"https://www.yuesecoding.top\", \"CLAUDE_CODE_MAX_OUTPUT_TOKENS\": \"64000\", \"CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC\": \"1\" }, \"permissions\": { \"allow\": [], \"deny\": [] }, \"alwaysThinkingEnabled\": false }"
        - generic [ref=e186]:
          - generic [ref=e187]: 提示
