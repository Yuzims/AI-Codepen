        - heading "#MCP (上下文通用协议)" [level=2] [ref=e256]
        - paragraph [ref=e257]:
          - text: MCP（Model Context Protocol）允许 Claude Code 连接外部工具和服务。只在项目根目录创建
          - code [ref=e258]: .mcp.json
          - text: 文件即可配置。
        - generic [ref=e259]:
